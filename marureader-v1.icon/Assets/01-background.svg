<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Background layer: subtle green gradient (top-light to bottom-dark).
       Icon Composer can also set this directly as a solid/gradient fill,
       so this SVG is provided as a design reference and starting point. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6EC26E"/>
      <stop offset="100%" stop-color="#3A8B3A"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>
</svg>
